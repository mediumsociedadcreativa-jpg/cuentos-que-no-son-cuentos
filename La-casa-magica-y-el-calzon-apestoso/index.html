<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>La casa mágica y el calzón apestoso</title>
  <link rel="stylesheet" href="style.css">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</head>
<body>

  <div id="pantalla-inicio">
    <img src="imagenes/pagina-01.webp" alt="Portada" id="img-portada">
    <button id="btn-comenzar" onclick="comenzar()">
      <img src="imagenes/boton-comenzar.webp" alt="Comenzar">
    </button>
  </div>

  <div id="visor" class="oculto">

    <div id="barra-top">
      <button class="btn-inicio" onclick="regresarAlMenu()" title="Volver al menú">
        <img src="imagenes/boton-casita.webp" alt="Menú principal">
      </button>
      <div id="barra-progreso">
        <div id="progreso-fill"></div>
      </div>
      <span id="contador-pagina">1 / 14</span>
    </div>

    <div id="contenido-pagina">
      <img id="imagen-pagina" src="" alt="Ilustración del cuento">
      <img id="calzon-personaje" src="" alt="Calzón Apestoso" class="oculto">
    </div>

    <div id="zona-control">
      <div id="control-plastilina">
        <img src="imagenes/fondo-control.webp" alt="" id="fondo-control">

        <button class="btn-plastilina" id="btn-regresar" onclick="paginaAnterior()" aria-label="Página anterior">
          <img src="imagenes/boton-regresar.webp" alt="Regresar">
        </button>

        <button class="btn-plastilina" id="btn-jugar" onclick="toggleAudio()" aria-label="Reproducir / Pausar">
          <img src="imagenes/boton-jugar.webp" alt="Jugar" id="img-jugar">
        </button>
        <button class="btn-plastilina" id="btn-avanzar" onclick="paginaSiguiente()" aria-label="Página siguiente">
          <img src="imagenes/boton-avanzar.webp" alt="Avanzar">
        </button>
      </div>
    </div>

  </div>

  <audio id="audio-cuento" src=""></audio>
  <audio id="audio-efecto" src="audios/efecto-hoja.mp3" preload="auto"></audio>

  <script src="script.js"></script>
  
    <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Verificamos si viene del encadenador principal usando la sesión
      if (sessionStorage.getItem('sesionIniciada') === 'true') {
        
        // Ocultamos la portada y mostramos el visor de inmediato
        document.getElementById('pantalla-inicio').classList.add('oculto');
        document.getElementById('visor').classList.remove('oculto');

        // Modificamos la variable global de script.js para que apunte a la página 2 (índice 1)
        paginaActual = 1; 

        // Forzamos la carga de la página (esto actualiza imágenes, barra de progreso y arranca el audio)
        if (typeof cargarPagina === "function") {
          cargarPagina();
        }
      }
    });
  </script>
</body>
</html>
