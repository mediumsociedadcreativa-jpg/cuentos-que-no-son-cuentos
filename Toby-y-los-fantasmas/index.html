<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Toby y los fantasmas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PANTALLA DE INICIO -->
  <div id="pantalla-inicio">
    <img src="imagenes/pagina-01.jpg" alt="Portada" id="img-portada">
    <button id="btn-comenzar" onclick="comenzar()">
      <img src="imagenes/boton-comenzar.png" alt="Comenzar">
    </button>
  </div>

  <!-- VISOR DEL CUENTO -->
  <div id="visor" class="oculto">

    <!-- BARRA DE PROGRESO ARRIBA -->
    <div id="barra-top">
      <button class="btn-inicio" onclick="reiniciar()" title="Volver al menú">
         <img src="imagenes/boton-casita.png" alt="Menú principal">
      </button>
      <div id="barra-progreso">
        <div id="progreso-fill"></div>
      </div>
      <span id="contador-pagina">1 / 14</span>
    </div>

    <!-- ILUSTRACIÓN + FANTASMITA -->
    <div id="contenido-pagina">
      <img id="imagen-pagina" src="" alt="Ilustración">
      <!-- Fantasmita decorativo -->
      <img id="fantasmita" src="" alt="">
    </div>

    <!-- CONTROL DE PLASTILINA -->
    <div id="zona-control">
      <div id="control-plastilina">

        <img src="imagenes/fondo-control.png" alt="" id="fondo-control">

        <button class="btn-plastilina" id="btn-regresar" onclick="paginaAnterior()" aria-label="Página anterior">
          <img src="imagenes/boton-regresar.png" alt="Regresar">
        </button>

        <button class="btn-plastilina" id="btn-jugar" onclick="toggleAudio()" aria-label="Reproducir">
          <img src="imagenes/boton-jugar.png" alt="Jugar" id="img-jugar">
        </button>

        <button class="btn-plastilina" id="btn-avanzar" onclick="paginaSiguiente()" aria-label="Página siguiente">
          <img src="imagenes/boton-avanzar.png" alt="Avanzar">
        </button>

      </div>
    </div>

  </div>

  <!-- AUDIO -->
  <audio id="audio-cuento" src=""></audio>

  <script src="script.js"></script>
</body>
</html>
