<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Cuentos que no son cuentos</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d0d1a">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-bg: #EEEDFE;
      --purple-title: #3C3489;
      --purple-tag-bg: #AFA9EC;
      --purple-tag-text: #26215C;

      --orange-bg: #FAECE7;
      --orange-title: #712B13;
      --orange-tag-bg: #F0997B;
      --orange-tag-text: #4A1B0C;

      --green-bg: #EAF3DE;
      --green-title: #27500A;
      --green-tag-bg: #97C459;
      --green-tag-text: #173404;

      --blue-bg: #E6F1FB;
      --blue-title: #0C447C;
      --blue-tag-bg: #85B7EB;
      --blue-tag-text: #042C53;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: #0d0d1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* PANTALLA DE ENTRADA MÁGICA */
    #pantalla-entrada {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    
    .btn-comenzar {
      font-family: 'Baloo 2', cursive;
      font-size: 28px;
      font-weight: 800;
      color: #0d0d1a;
      background: #f3ff37;
      border: none;
      padding: 15px 40px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(243, 255, 55, 0.3);
      transition: transform 0.2s ease;
      animation: pulsoBoton 1.5s infinite;
    }
    
    .btn-comenzar:active { transform: scale(0.95); }

    @keyframes pulsoBoton {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); box-shadow: 0 12px 30px rgba(243, 255, 55, 0.5); }
    }

    .wrapper {
      text-align: center;
      width: 100%;
      max-width: 560px;
    }

    .estrellas {
      font-size: 22px;
      letter-spacing: 6px;
      color: #a09bd8;
      margin-bottom: 1rem;
      animation: fadeIn 0.6s ease both;
    }

    h1 {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 800;
      color: #ffffff;
      line-height: 1.15;
      margin-bottom: 0.4rem;
      animation: fadeIn 0.7s ease both;
    }

    .subtitulo {
      font-size: 19px;
      color: #f3ff37;
      margin-bottom: 2.5rem;
      animation: fadeIn 0.8s ease both;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .card {
      border-radius: 20px;
      padding: 2.2rem 1.25rem 1.5rem;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      animation: fadeUp 0.5s ease both;
      -webkit-tap-highlight-color: transparent;
      position: relative; /* Esencial para posicionar la radio adentro */
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.25);
    }

    /* BOTÓN MINI RADIO EN CADA TARJETA */
    .btn-radio-tarjeta {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 66px;
      height: 66px;
      cursor: pointer;
      z-index: 10; /* Se mantiene por encima del enlace de la tarjeta */
      transition: transform 0.2s ease;
    }

    .btn-radio-tarjeta:hover {
      transform: scale(1.15);
    }

    /* ANIMACIÓN DE LA RADIO BAILANDO */
    .radio-bailando {
      animation: radioBaile 0.6s ease-in-out infinite;
    }

    @keyframes radioBaile {
      0%, 100% { transform: rotate(0deg) scale(1.1); }
      25% { transform: rotate(-10deg); }
      75% { transform: rotate(10deg); }
    }

    .card-icon {
      font-size: 50px;
      line-height: 1;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: inline-block;
      margin-top: 5px;
    }
    
    .card-icon img {
      max-width: 150px;
      height: auto;
      display: block;
    }

    .card-title {
      font-family: 'Baloo 2', cursive;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.2;
    }

    .card-tag {
      font-size: 14px;
      font-weight: 800;
      padding: 4px 14px;
      border-radius: 20px;
      margin-top: auto;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .card-purple { background: var(--purple-bg); }
    .card-purple .card-title { color: var(--purple-title); }
    .card-purple .card-tag { background: var(--purple-tag-bg); color: var(--purple-tag-text); }

    .card-orange { background: var(--orange-bg); }
    .card-orange .card-title { color: var(--orange-title); }
    .card-orange .card-tag { background: var(--orange-tag-bg); color: var(--orange-tag-text); }

    .card-green { background: var(--green-bg); }
    .card-green .card-title { color: var(--green-title); }
    .card-green .card-tag { background: var(--green-tag-bg); color: var(--green-tag-text); }

    .card-blue { background: var(--blue-bg); }
    .card-blue .card-title { color: var(--blue-title); }
    .card-blue .card-tag { background: var(--blue-tag-bg); color: var(--blue-tag-text); }

    /* ANIMACIONES DE LOS PERSONAJES */
    .animar-toby { animation: temblarMiedo 0.4s ease-in-out 2; }
    @keyframes temblarMiedo {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px) rotate(-2deg); }
      40%, 80% { transform: translateX(4px) rotate(2deg); }
    }

    .animar-calzon { transform-origin: top center; animation: balanceoComico 0.5s ease-in-out 1; }
    @keyframes balanceoComico {
      0%, 100% { transform: rotate(0deg); }
      30% { transform: rotate(15deg) scale(1.1); }
      60% { transform: rotate(-15deg) scale(1.1); }
    }

    .animar-oveja { animation: brincoAlegre 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) 1; }
    @keyframes brincoAlegre {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-15px) scaleY(1.1) scaleX(0.9); }
    }

    .animar-no { animation: vueltaEmocion 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1; }
    @keyframes vueltaEmocion {
      0% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.2) rotate(10deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 420px) {
      .grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .card { padding: 1.5rem 0.6rem 1rem; min-height: 190px; }
      .btn-radio-tarjeta { width: 30px; height: 30px; top: 8px; right: 8px; }
      .card-icon img { max-width: 55px; }
      .card-title { font-size: 15px; }
      .card-tag { font-size: 11px; padding: 2px 8px; }
    }

/* Contenedor del globo */
#globo-sorpresa {
  position: absolute;
  /* Dejamos la posición inicial de arranque por defecto */
  top: 15%; 
  left: 75%;
  width: 80px;
  cursor: pointer;
  /* El truco: transition controla cómo desaparece y cómo se mueve */
  transition: transform 0.2s ease-out, opacity 0.2s ease-out, top 0s, left 0s;
  animation: flotarGlobo 3s ease-in-out infinite;
  z-index: 10;
}
/* Animación de flotado suave */
@keyframes flotarGlobo {
  0% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-15px) rotate(3deg); }
  100% { transform: translateY(0px) rotate(0deg); }
}

/* Efecto cuando explota */
#globo-sorpresa.explotado {
  transform: scale(0); /* Se encoge a la nada */
  opacity: 0;         /* Se vuelve invisible */
  pointer-events: none; /* Ya no se puede volver a tocar */
}

  </style>
</head>
<body>

  <div id="pantalla-entrada">
    <h1 style="margin-bottom: 2rem;">¡Estás listo!</h1>
    <div id="globo-sorpresa" onclick="reventarGlobo()" aria-label="Globo de plastilina secreto">
    <img src="imagenes/globo-plastilina.webp" alt="Globo 3D">
  </div>
      <audio id="audio-pop" src="audios/globo-pop.mp3"></audio>
    <button class="btn-comenzar" onclick="comenzarExperiencia()">¡A JUGAR! 🎈</button>
  </div>

  <div class="wrapper">
    <h1>Cuentos que no<br>son cuentos</h1>
    <p class="subtitulo">Elige tu aventura</p>
    <div class="estrellas">⭐️ ⭐️ ⭐️</div>

    <div class="grid">
      <a class="card card-purple" href="Toby-y-los-fantasmas/index.html" data-animacion="animar-toby" data-audio="audios/toby.mp3">
        <img src="imagenes/radio.webp" class="btn-radio-tarjeta" data-cancion="audios/cancion-toby.mp3" alt="Radio Música">
        <div class="card-icon"><img src="imagenes/icono-toby-fantasmas.webp" alt="Cuento Misterio"></div>
        <div class="card-title">Toby y los fantasmas</div>
        <div class="card-tag">Misterio</div>
      </a>

      <a class="card card-orange" href="La-casa-magica-y-el-calzon-apestoso/index.html" data-animacion="animar-calzon" data-audio="audios/calzon.mp3">
        <img src="imagenes/radio.webp" class="btn-radio-tarjeta" data-cancion="audios/cancion-calzon.mp3" alt="Radio Música">
        <div class="card-icon"><img src="imagenes/icono-la-casa.webp" alt="Cuento Humor"></div>
        <div class="card-title">La casa mágica y el calzón apestoso</div>
        <div class="card-tag">Humor</div>
      </a>

      <a class="card card-green" href="La-oveja-que-cruzo-el-puente/index.html" data-animacion="animar-oveja" data-audio="audios/oveja.mp3">
        <img src="imagenes/radio.webp" class="btn-radio-tarjeta" data-cancion="audios/cancion-oveja.mp3" alt="Radio Música">
        <div class="card-icon"><img src="imagenes/icono-la-oveja.webp" alt="Cuento Aventura"></div>
        <div class="card-title">La oveja que cruzó el puente</div>
        <div class="card-tag">Aventura</div>
      </a>

      <a class="card card-blue" href="No-no-no-y-todo-cambio/index.html" data-animacion="animar-no" data-audio="audios/no.mp3">
        <img src="imagenes/radio.webp" class="btn-radio-tarjeta" data-cancion="audios/cancion-no.mp3" alt="Radio Música">
        <div class="card-icon"><img src="imagenes/icono-no-no-no.webp" alt="Cuento Emoción"></div>
        <div class="card-title">Ño, ño, ño, y todo cambió</div>
        <div class="card-tag">Emoción</div>
      </a>
    </div>
  </div>

  <audio id="reproductor-app" preload="auto"></audio>
  <audio id="audio-bienvenida" src="audios/bienvenida.mp3" preload="auto"></audio>
  <audio id="audio-radio-compartido" preload="auto"></audio>

<script>
    // ========================================================
    // ¡FUNCIÓN DEL GLOBO INTERACTIVO REPARADA!
    // ========================================================
    function reventarGlobo() {
      const globo = document.getElementById('globo-sorpresa');
      const audioPop = document.getElementById('audio-pop');
      
      // Verificamos que el globo exista y que no esté ya explotado
      if (globo && audioPop && !globo.classList.contains('explotado')) {
        
        // 1. Suena el ¡POP! instantáneo
        audioPop.play().catch(e => console.log("Audio bloqueado"));
        
        // 2. Se activa la animación de desaparecer
        globo.classList.add('explotado');
        
        // 3. Mientras está invisible, calculamos su nueva posición al azar
        // Math.random() nos da un número entre 0 y 1. 
        // Multiplicamos para que se mueva en zonas seguras de la pantalla.
        const nuevoTop = Math.floor(Math.random() * 60) + 10;   // Entre el 10% y 70% de la pantalla
        const nuevoLeft = Math.floor(Math.random() * 70) + 10;  // Entre el 10% y 80% de la pantalla
        
        // 4. Esperamos a que termine de desaparecer y lo movemos en secreto
        setTimeout(() => {
          globo.style.top = `${nuevoTop}%`;
          globo.style.left = `${nuevoLeft}%`;
          
          // Quitamos la clase 'explotado' para que vuelva a aparecer flotando en su nuevo lugar
          globo.classList.remove('explotado');
        }, 800); // Espera 4 segundos invisible antes de aparecer en su nueva ubicación
      }
    }

    // ========================================================
    // LOGICA GENERAL DE LA PORTADA PRINCIPAL
    // ========================================================
    const tarjetas = document.querySelectorAll('.card');  
    const radios = document.querySelectorAll('.btn-radio-tarjeta');
    const reproductor = document.getElementById('reproductor-app');
    const audioBienvenida = document.getElementById('audio-bienvenida');
    const audioRadio = document.getElementById('audio-radio-compartido');

    const infoAnimaciones = [
      { selector: '.card-purple .card-icon', clase: 'animar-toby' },
      { selector: '.card-orange .card-icon', clase: 'animar-calzon' },
      { selector: '.card-green .card-icon', clase: 'animar-oveja' },
      { selector: '.card-blue .card-icon', clase: 'animar-no' }
    ];
    
    let indiceActual = 0;
    let intervaloCiclo;
    let temporizadorRadio;

    // 1. CONTROL DE LA CORTINA DE BIENVENIDA
    function comenzarExperiencia() {
      const cortina = document.getElementById('pantalla-entrada');
      cortina.style.opacity = '0';
      cortina.style.visibility = 'hidden';

      if (audioBienvenida) {
        audioBienvenida.play().catch(e => console.log("Audio desbloqueado"));
      }

      iniciarCicloAutomatico();
    }

    // 2. MOTOR DEL CICLO EN PAUSA
    function iniciarCicloAutomatico() {
      intervaloCiclo = setInterval(() => {
        const personaje = infoAnimaciones[indiceActual];
        const elemento = document.querySelector(personaje.selector);
        
        if (elemento) {
          elemento.classList.add(personaje.clase);
          setTimeout(() => {
            elemento.classList.remove(personaje.clase);
          }, 800);
        }
        indiceActual = (indiceActual + 1) % infoAnimaciones.length;
      }, 2500); 
    }

    // 3. LÓGICA DE LAS RADIOS EN LAS TARJETAS
    radios.forEach(radio => {
      radio.addEventListener('click', function(evento) {
        evento.stopPropagation(); // ¡CLAVE! Evita que al tocar la radio se abra el cuento por accidente
        evento.preventDefault();

        const rutaCancion = this.getAttribute('data-cancion');

        // Detener cualquier reproducción previa de la radio y limpiar bailes antiguos
        audioRadio.pause();
        clearTimeout(temporizadorRadio);
        radios.forEach(r => r.classList.remove('radio-bailando'));

        // Apagar la bienvenida si seguía sonando
        if (audioBienvenida) audioBienvenida.pause();

        // Cargar y reproducir la nueva canción asignada a esta radio
        audioRadio.src = rutaCancion;
        audioRadio.load();
        audioRadio.play().catch(e => console.log("Error al reproducir música de la radio"));
        
        // Poner a bailar ÚNICAMENTE a la radio que fue presionada
        this.classList.add('radio-bailando');

        // Apagar automáticamente la música y detener el baile en 45 segundos
        temporizadorRadio = setTimeout(() => {
          audioRadio.pause();
          this.classList.remove('radio-bailando');
        }, 45000);
      });
    });

    // 4. ACCIÓN AL TOCAR UNA TARJETA (Para entrar al cuento)
    tarjetas.forEach(tarjeta => {
      tarjeta.addEventListener('click', function(evento) {
        evento.preventDefault();
        
        clearInterval(intervaloCiclo);
        clearTimeout(temporizadorRadio);
        
        // Apagamos todo lo que esté sonando antes del viaje
        if (audioBienvenida) audioBienvenida.pause();
        audioRadio.pause();
        radios.forEach(r => r.classList.remove('radio-bailando'));
        
        const destino = this.getAttribute('href');
        const nombreAnimacion = this.getAttribute('data-animacion');
        const rutaAudio = this.getAttribute('data-audio');
        const contenedorIcono = this.querySelector('.card-icon');

        document.querySelectorAll('.card-icon').forEach(icon => {
          icon.className = 'card-icon'; 
        });

        if (contenedorIcono && nombreAnimacion) {
          contenedorIcono.classList.add(nombreAnimacion);
        }

        if (rutaAudio && reproductor) {
          reproducer.src = rutaAudio;
          reproductor.load();
          reproductor.play().catch(e => console.log("Error de audio"));
        }

        setTimeout(() => {
          window.location.href = destino;
        }, 6000); 
      });
    });
  </script>
</body>
</html>
