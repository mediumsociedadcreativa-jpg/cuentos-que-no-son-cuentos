<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuentos que no son cuentos</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d0d1a">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-bg: #EEEDFE;
      --purple-title: #3C3489;
      --purple-tag-bg: #AFA9EC;
      --purple-tag-text: #26215C;

      --orange-bg: #FAECE7;
      --orange-title: #712B13;
      --orange-tag-bg: #F0997B;
      --orange-tag-text: #4A1B0C;

      --green-bg: #EAF3DE;
      --green-title: #27500A;
      --green-tag-bg: #97C459;
      --green-tag-text: #173404;

      --blue-bg: #E6F1FB;
      --blue-title: #0C447C;
      --blue-tag-bg: #85B7EB;
      --blue-tag-text: #042C53;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: #0d0d1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .wrapper {
      text-align: center;
      width: 100%;
      max-width: 560px;
    }

    .estrellas {
      font-size: 22px;
      letter-spacing: 6px;
      color: #a09bd8;
      margin-bottom: 1rem;
      animation: fadeIn 0.6s ease both;
    }

    h1 {
      font-family: 'Baloo';
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 800;
      color: #ffffff;
      line-height: 1.15;
      margin-bottom: 0.4rem;
      animation: fadeIn 0.7s ease both;
    }

    .subtitulo {
      font-size: 19px;
      color: #f3ff37;
      margin-bottom: 2.5rem;
      animation: fadeIn 0.8s ease both;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .card {
      border-radius: 20px;
      padding: 2rem 1.25rem 1.5rem;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      animation: fadeUp 0.5s ease both;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.25);
    }

    .card-icon {
      font-size: 50px;
      line-height: 1;
    }

    .card-title {
      font-family: 'Baloo 2', cursive;
      font-size: 26px;
      font-weight: 600;
      line-height: 1.35;
    }

    .card-tag {
      font-size: 18px;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: 20px;
      margin-top: 2px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .card-purple { background: var(--purple-bg); }
    .card-purple .card-title { color: var(--purple-title); }
    .card-purple .card-tag { background: var(--purple-tag-bg); color: var(--purple-tag-text); }

    .card-orange { background: var(--orange-bg); }
    .card-orange .card-title { color: var(--orange-title); }
    .card-orange .card-tag { background: var(--orange-tag-bg); color: var(--orange-tag-text); }

    .card-green { background: var(--green-bg); }
    .card-green .card-title { color: var(--green-title); }
    .card-green .card-tag { background: var(--green-tag-bg); color: var(--green-tag-text); }

    .card-blue { background: var(--blue-bg); }
    .card-blue .card-title { color: var(--blue-title); }
    .card-blue .card-tag { background: var(--blue-tag-bg); color: var(--blue-tag-text); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 400px) {
      .grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .card { padding: 1.5rem 0.75rem 1.25rem; }
      .card-icon { font-size: 36px; }
      .card-title { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    
    <h1>Cuentos que no<br>son cuentos</h1>
    <p class="subtitulo">Elige tu aventura</p>
    <div class="estrellas">✦ ✦ ✦</div>

    <div class="grid">
      <a class="card card-purple" href="Toby-y-los-fantasmas/index.html">
        <div class="card-icon"><img src="imagenes/icono-toby-fantasmas.png" alt="Cuento Misterio"></div>
        <div class="card-title">Toby y los fantasmas</div>
        <div class="card-tag">Misterio</div>
      </a>

      <a class="card card-orange" href="La-casa-magica-y-el-calzon-apestoso/index.html">
        <div class="card-icon"><img src="imagenes/icono-la-casa.png" alt="Cuento Humor"></div>
        <div class="card-title">La casa mágica y el calzón apestoso</div>
        <div class="card-tag">Humor</div>
      </a>

      <a class="card card-green" href="La-oveja-que-cruzo-el-puente/index.html">
        <div class="card-icon"><img src="imagenes/icono-la-oveja.png" alt="Cuento Aventura"></div>
        <div class="card-title">La oveja que cruzó el puente</div>
        <div class="card-tag">Aventura</div>
      </a>

      <a class="card card-blue" href="No-no-no-y-todo-cambio/index.html">
        <div class="card-icon"><img src="imagenes/icono-no-no-no.png" alt="Cuento Emoción"></div>
        <div class="card-title">Ño, ño, ño, y todo cambió</div>
        <div class="card-tag">Emoción</div>
      </a>
    </div>
  </div>
</body>
</html>
